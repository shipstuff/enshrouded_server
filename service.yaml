apiVersion: v1
kind: Service
metadata:
  name: enshrouded
  namespace: games
spec:
  type: NodePort
  selector:
    app: enshrouded
  ports:
    - name: game-udp
      protocol: UDP
      port: 15637
      targetPort: game-udp
      nodePort: 32637
    - name: steam-query
      protocol: UDP
      port: 27015
      targetPort: query-udp
      nodePort: 32015
    - name: stats-api
      protocol: TCP
      port: 8091
      targetPort: stats-api
      nodePort: 32091
    # Optional startup import UI exposure (only useful when SAVE_IMPORT_MODE=1).
    # - name: import-ui
    #   protocol: TCP
    #   port: 8080
    #   targetPort: 8080
    #   nodePort: 32080
