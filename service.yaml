apiVersion: v1
kind: Service
metadata:
  name: enshrouded
  namespace: games
spec:
  type: NodePort
  selector:
    app: enshrouded
  ports:
    - name: game-udp-1
      protocol: UDP
      port: 15636
      targetPort: 15636
      nodePort: 32636
    - name: game-udp-2
      protocol: UDP
      port: 15637
      targetPort: 15637
      nodePort: 32637
    - name: steam-query
      protocol: UDP
      port: 27015
      targetPort: 27015
      nodePort: 32015
    - name: stats-api
      protocol: TCP
      port: 8091
      targetPort: 8091
      nodePort: 32091
    # Optional startup import UI exposure (only useful when SAVE_IMPORT_MODE=1).
    # - name: import-ui
    #   protocol: TCP
    #   port: 8080
    #   targetPort: 8080
    #   nodePort: 32080
